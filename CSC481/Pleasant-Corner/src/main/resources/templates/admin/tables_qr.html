<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pleasant Corner – Tables &amp; QR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/tabel.css}"/>
  <style>
    /* QR preview panel inside the Add/Edit modal */
    .tq-qr-panel {
      background: #fdf9f2;
      border: 1px solid #e6dcc5;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      margin: 4px 0 16px;
    }
    .tq-qr-panel-label {
      font-size: .68rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #b8923a;
      margin-bottom: 14px;
    }
    #modalQrBox canvas { border-radius: 6px; }
    #modalQrUrl, #qrViewUrl {
      font-size: .72rem;
      color: #b8923a;
      margin-top: 12px;
      word-break: break-all;
    }
    /* number spinner layout */
    .tq-number-wrap { position: relative; display: flex; align-items: stretch; gap: 0; }
    .tq-number-wrap .tq-input { flex: 1; border-radius: var(--radius-sm) 0 0 var(--radius-sm); margin-bottom: 0; }
    .tq-arrows { display: flex; flex-direction: column; }
    .tq-arrow {
      background: #fdf8ef; border: 1.5px solid #e0d8c4;
      width: 32px; flex: 1;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: .65rem; color: #7a6535;
      transition: background .15s;
    }
    .tq-arrow:first-child { border-radius: 0 var(--radius-sm) 0 0; border-bottom-width: .75px; }
    .tq-arrow:last-child  { border-radius: 0 0 var(--radius-sm) 0; border-top-width: .75px; }
    .tq-arrow:hover { background: #f5ede0; }
    .tq-two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  </style>
</head>
<body>
<div id="appWrapper" class="app-wrapper">
  <div id="sidebarOverlay"></div>
  <div th:replace="~{admin/fragments :: sidebar('tables-qr')}"></div>
  <div class="main-panel" id="mainPanel">
    <div th:replace="~{admin/fragments :: topbar('Tables &amp; QR')}"></div>
    <main class="page-content">
      <button class="btn-add-table" id="addTableBtn">+ Add Table</button>
      <div class="tables-card">
        <table class="tq-table">
          <thead>
            <tr>
              <th>TABLE NO.</th>
              <th>SEATS</th>
              <th>LOCATION / NOTE</th>
              <th>QR CODE</th>
              <th>STATUS</th>
              <th class="th-actions">ACTIONS</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </main>
  </div>
</div>

<!-- ADD / EDIT TABLE MODAL – using correct tq-* CSS classes -->
<div class="modal fade" id="tableModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered" style="max-width:520px;">
    <div class="modal-content tq-modal-content" style="position:relative;">

      <div class="tq-header">
        <div class="tq-title" id="tModalTitle">Add Table</div>
        <button class="tq-close" data-bs-dismiss="modal" aria-label="Close"><i class="bi bi-x"></i></button>
      </div>

      <div class="tq-body">
        <div class="tq-two-col">
          <div>
            <label class="tq-label">Table Number</label>
            <div class="tq-number-wrap">
              <input type="number" class="tq-input" id="tNumber" placeholder="1" min="1" oninput="updateModalQr()"/>
              <div class="tq-arrows">
                <button class="tq-arrow" id="numUp"><i class="bi bi-caret-up-fill"></i></button>
                <button class="tq-arrow" id="numDown"><i class="bi bi-caret-down-fill"></i></button>
              </div>
            </div>
          </div>
          <div>
            <label class="tq-label">Seat Count</label>
            <div class="tq-number-wrap">
              <input type="number" class="tq-input" id="tSeats" placeholder="max 4" min="1" max="20"/>
              <div class="tq-arrows">
                <button class="tq-arrow" id="seatUp"><i class="bi bi-caret-up-fill"></i></button>
                <button class="tq-arrow" id="seatDown"><i class="bi bi-caret-down-fill"></i></button>
              </div>
            </div>
          </div>
        </div>

        <label class="tq-label">Location / Note</label>
        <input type="text" class="tq-input" id="tNote" placeholder="e.g. Window seat, Outdoor"/>

        <!-- Live QR Preview -->
        <div class="tq-qr-panel">
          <div class="tq-qr-panel-label">QR Code Preview</div>
          <div id="modalQrBox" style="display:flex;align-items:center;justify-content:center;min-height:140px;"></div>
          <div id="modalQrUrl"></div>
        </div>

        <label class="tq-label">Status</label>
        <select class="tq-input tq-select" id="tStatus">
          <option value="active">Active</option>
          <option value="inactive">Inactive</option>
        </select>
      </div>

      <div class="tq-footer">
        <button class="tq-btn-cancel" data-bs-dismiss="modal">Cancel</button>
        <button class="tq-btn-save" id="saveTableBtn">
          <i class="bi bi-qr-code" style="margin-right:6px;font-size:.85rem;"></i>Save &amp; Generate QR
        </button>
      </div>
    </div>
  </div>
</div>

<!-- QR VIEW MODAL -->
<div class="modal fade" id="qrModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered" style="max-width:360px;">
    <div class="modal-content tq-modal-content" style="position:relative;">

      <div class="tq-header">
        <div class="tq-title" id="qrModalTitle">QR Code</div>
        <button class="tq-close" data-bs-dismiss="modal" aria-label="Close"><i class="bi bi-x"></i></button>
      </div>

      <div class="tq-body" style="text-align:center;padding:24px 28px 20px;">
        <div id="qrViewBox" style="display:flex;align-items:center;justify-content:center;margin-bottom:4px;"></div>
        <div id="qrViewUrl" style="margin-bottom:20px;"></div>
        <button class="tq-btn-download" id="downloadQrBtn" style="width:100%;justify-content:center;">
          <i class="bi bi-download"></i> Download QR
        </button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script th:inline="javascript">
  /*<![CDATA[*/
  var initialTables = /*[[${tableList}]]*/ [];
  /*]]>*/
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/pages.js}"></script>
</body>
</html>

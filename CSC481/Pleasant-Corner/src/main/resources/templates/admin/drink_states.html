<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pleasant Corner – Drink States</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/drink_state_style.css}"/>
  <link rel="stylesheet" th:href="@{/css/discount_style.css}"/>
</head>
<body>
<div id="appWrapper" class="app-wrapper">
  <div id="sidebarOverlay"></div>
  <div th:replace="~{admin/fragments :: sidebar('drink-states')}"></div>
  <div class="main-panel" id="mainPanel">
    <div th:replace="~{admin/fragments :: topbar('Drink States')}"></div>
    <main class="page-content">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:6px;">
        <button class="btn-add-state" id="addStateBtn">+ Add Drink State</button>
        <div class="dp-filter-tabs" id="dsFilterTabs">
          <button class="dp-tab active" data-ds-filter="all">All <span class="dp-tab-count" id="dsCountAll">0</span></button>
          <button class="dp-tab" data-ds-filter="active">Active <span class="dp-tab-count" id="dsCountActive">0</span></button>
          <button class="dp-tab" data-ds-filter="inactive">Inactive <span class="dp-tab-count" id="dsCountInactive">0</span></button>
        </div>
      </div>
      <div class="ds-layout">
        <div>
          <div class="states-card">
            <div class="states-card-header">
              <span class="states-card-title">Drink Temperature / State Options</span>
              <span class="states-card-sub">Applies to: All drinks</span>
            </div>
            <div id="statesList"></div>
          </div>
        </div>
        <div>
          <div class="rules-card">
            <div class="rules-card-title">Rules</div>
            <div class="rule-row">
              <div class="rule-info">
                <div class="rule-title">Require state selection</div>
                <div class="rule-sub">Customer must pick Hot/Iced</div>
              </div>
              <label class="toggle-switch">
                <input type="checkbox" id="ruleRequire" checked/>
                <span class="toggle-slider"></span>
              </label>
            </div>
            <div class="rule-row">
              <div class="rule-info">
                <div class="rule-title">Show on food items too</div>
                <div class="rule-sub">E.g. "Warm" for pastries</div>
              </div>
              <label class="toggle-switch">
                <input type="checkbox" id="ruleFood"/>
                <span class="toggle-slider"></span>
              </label>
            </div>
            <div class="rule-divider"></div>
            <div class="default-state-label">Default state</div>
            <select class="default-state-select" id="defaultStateSelect">
              <option value="hot">Hot</option>
              <option value="iced">Iced</option>
            </select>
            <button class="btn-save-rules" id="saveRulesBtn">Save Rules</button>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- ADD / EDIT STATE MODAL – using correct ds-* CSS classes -->
<div class="modal fade" id="stateModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered" style="max-width:480px;">
    <div class="modal-content ds-modal-content" style="position:relative;">

      <div class="ds-header">
        <div class="ds-title" id="stateModalTitle">Add Drink State</div>
        <button class="ds-close" data-bs-dismiss="modal" aria-label="Close"><i class="bi bi-x"></i></button>
      </div>

      <div class="ds-body">

        <label class="ds-label">State Name</label>
        <input type="text" class="ds-input" id="stateName" placeholder="e.g. Hot"/>

        <div class="ds-row">
          <div>
            <label class="ds-label">Extra Price (฿)</label>
            <input type="number" class="ds-input" id="statePrice" value="0" min="0"/>
          </div>
          <div>
            <label class="ds-label">Emoji / Icon</label>
            <button type="button" class="ds-emoji-btn" id="stateEmojiBtn" onclick="dsCycleEmoji()">
              <span class="ds-emoji-current" id="stateEmojiCurrent">🔥</span>
              <span class="ds-emoji-tap">tap to change</span>
            </button>
            <input type="hidden" id="stateEmoji" value="🔥"/>
          </div>
        </div>

        <label class="ds-label">Description</label>
        <input type="text" class="ds-input" id="stateDesc" placeholder="Short description (optional)"/>

        <label class="ds-label">Active</label>
        <div class="ds-avail-row">
          <label class="toggle-switch">
            <input type="checkbox" id="stateActive" checked/>
            <span class="toggle-slider"></span>
          </label>
          <span class="ds-avail-label">Active</span>
        </div>

      </div>

      <div class="ds-footer">
        <button class="ds-btn-cancel" data-bs-dismiss="modal">Cancel</button>
        <button class="ds-btn-save" id="saveStateBtn">Save State</button>
      </div>
    </div>
  </div>
</div>

<script th:inline="javascript">
  /*<![CDATA[*/
  var initialDrinkStates = /*[[${drinkStateList}]]*/ [];
  /*]]>*/
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const DS_EMOJIS = ['🔥','🧊','🌀','🫗','☀️','❄️','💨','🌊','⚡','🍵','☕','🧋','🥤','🫖'];
  let dsEmojiIdx = 0;
  function dsCycleEmoji() {
    dsEmojiIdx = (dsEmojiIdx + 1) % DS_EMOJIS.length;
    const e = DS_EMOJIS[dsEmojiIdx];
    document.getElementById('stateEmojiCurrent').textContent = e;
    document.getElementById('stateEmoji').value = e;
  }
  function dsSetEmoji(e) {
    document.getElementById('stateEmojiCurrent').textContent = e;
    document.getElementById('stateEmoji').value = e;
    dsEmojiIdx = DS_EMOJIS.indexOf(e);
    if (dsEmojiIdx < 0) dsEmojiIdx = 0;
  }
</script>
<script th:src="@{/js/pages.js}"></script>
</body>
</html>

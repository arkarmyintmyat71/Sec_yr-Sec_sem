<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pleasant Corner – Discounts &amp; Promos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/discount_style.css}"/>
</head>
<body>
<div id="appWrapper" class="app-wrapper">
  <div id="sidebarOverlay"></div>
  <div th:replace="~{admin/fragments :: sidebar('discounts')}"></div>
  <div class="main-panel" id="mainPanel">
    <div th:replace="~{admin/fragments :: topbar('Discounts &amp; Promos')}"></div>
    <main class="page-content">

      <!-- Stat Cards -->
      <div class="dp-stats-row">
        <div class="dp-stat-card">
          <div class="dp-stat-label">ACTIVE PROMOS</div>
          <div class="dp-stat-value" id="statActive">0</div>
          <div class="dp-stat-sub" id="statExpiring">—</div>
        </div>
        <div class="dp-stat-card">
          <div class="dp-stat-label">SAVINGS GIVEN TODAY</div>
          <div class="dp-stat-value">฿1,240</div>
          <div class="dp-stat-sub">Across 36 orders</div>
        </div>
        <div class="dp-stat-card">
          <div class="dp-stat-label">MOST USED PROMO</div>
          <div class="dp-stat-value dp-stat-code">HAPPY10</div>
          <div class="dp-stat-sub">Used 87 times this month</div>
        </div>
      </div>

      <!-- Filter Tabs + New Button -->
      <div class="dp-toolbar">
        <div class="dp-filter-tabs">
          <button class="dp-tab active" data-filter="all">All <span class="dp-tab-count" id="countAll">0</span></button>
          <button class="dp-tab" data-filter="active">Active <span class="dp-tab-count" id="countActive">0</span></button>
          <button class="dp-tab" data-filter="scheduled">Scheduled <span class="dp-tab-count" id="countScheduled">0</span></button>
          <button class="dp-tab" data-filter="expired">Expired <span class="dp-tab-count" id="countExpired">0</span></button>
        </div>
        <button class="dp-btn-new" id="newPromoBtn"><i class="bi bi-plus"></i> New Promotion</button>
      </div>

      <!-- Promo Cards -->
      <div class="dp-cards-grid" id="promoCardsGrid"></div>
    </main>
  </div>
</div>

<!-- ADD / EDIT PROMO MODAL -->
<div class="modal fade" id="promoModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content pm-modal-content">
      <div class="pm-header">
        <div class="pm-title" id="pmTitle">New Promotion</div>
        <button class="pm-close" data-bs-dismiss="modal"><i class="bi bi-x"></i></button>
      </div>
      <div class="pm-body">
        <!-- Hidden type field (set programmatically) -->
        <input type="hidden" id="pmType"/>

        <!-- Discount type cards -->
        <div class="pm-field pm-field-full">
          <label class="pm-label">Discount Type <span class="pm-req">*</span></label>
          <div class="pm-type-cards" id="pmTypeCards">
            <div class="pm-type-card" data-value="percent" onclick="dpSelectType('percent')">
              <i class="bi bi-percent pm-type-icon"></i>
              <div class="pm-type-name">Percentage</div>
              <div class="pm-type-desc">e.g. 10% off</div>
            </div>
            <div class="pm-type-card" data-value="fixed" onclick="dpSelectType('fixed')">
              <i class="bi bi-cash pm-type-icon"></i>
              <div class="pm-type-name">Fixed Amount</div>
              <div class="pm-type-desc">e.g. ฿50 off</div>
            </div>
            <div class="pm-type-card" data-value="bogo" onclick="dpSelectType('bogo')">
              <i class="bi bi-gift pm-type-icon"></i>
              <div class="pm-type-name">Buy X Get Y</div>
              <div class="pm-type-desc">e.g. Buy 2 Get 1</div>
            </div>
          </div>
        </div>

        <!-- Code + Name -->
        <div class="pm-row">
          <div class="pm-field">
            <label class="pm-label">Promo Code <span class="pm-req">*</span></label>
            <input type="text" class="pm-input" id="pmCode" placeholder="e.g. HAPPY10"/>
          </div>
          <div class="pm-field">
            <label class="pm-label">Promotion Name <span class="pm-req">*</span></label>
            <input type="text" class="pm-input" id="pmName" placeholder="e.g. Happy Hour Discount"/>
          </div>
        </div>

        <!-- Value or BOGO -->
        <div class="pm-row">
          <div class="pm-field" id="pmValueField">
            <label class="pm-label">Discount Value <span class="pm-req">*</span></label>
            <input type="number" class="pm-input" id="pmValue" placeholder="e.g. 10" min="0"/>
          </div>
          <div class="pm-field" id="pmBogoField" style="display:none;">
            <label class="pm-label">Buy Qty</label>
            <input type="number" class="pm-input" id="pmBuyQty" placeholder="e.g. 2" min="1"/>
          </div>
          <div class="pm-field" id="pmBogoGetField" style="display:none;">
            <label class="pm-label">Get Qty (free)</label>
            <input type="number" class="pm-input" id="pmGetQty" placeholder="e.g. 1" min="1"/>
          </div>
          <div class="pm-field">
            <label class="pm-label">Min Spend (฿)</label>
            <input type="number" class="pm-input" id="pmMinSpend" placeholder="0 = no minimum" min="0"/>
          </div>
        </div>

        <!-- Dates -->
        <div class="pm-row">
          <div class="pm-field">
            <label class="pm-label">Start Date</label>
            <input type="date" class="pm-input" id="pmStart"/>
          </div>
          <div class="pm-field">
            <label class="pm-label">End Date</label>
            <input type="date" class="pm-input" id="pmEnd"/>
          </div>
        </div>

        <!-- Applies To + Auto Apply -->
        <div class="pm-row">
          <div class="pm-field">
            <label class="pm-label">Applies To</label>
            <select class="pm-input" id="pmAppliesTo">
              <option value="all">All items</option>
              <option value="coffee">Coffee only</option>
              <option value="food">Food only</option>
              <option value="desserts">Desserts only</option>
              <option value="coffee_pastry">Coffee + Pastry</option>
            </select>
          </div>
          <div class="pm-field">
            <label class="pm-label">Apply Method</label>
            <select class="pm-input" id="pmAutoApplySelect">
              <option value="code">Customer enters code</option>
              <option value="auto">Auto-applied</option>
            </select>
          </div>
        </div>

        <!-- Description -->
        <div class="pm-field pm-field-full">
          <label class="pm-label">Description</label>
          <textarea class="pm-input pm-textarea" id="pmDesc" placeholder="Short description of this promotion..."></textarea>
        </div>
      </div>

      <div class="pm-footer">
        <button class="pm-btn-cancel" data-bs-dismiss="modal">Cancel</button>
        <button class="pm-btn-save" id="pmSaveBtn">Save Promotion</button>
      </div>
    </div>
  </div>
</div>

<script th:inline="javascript">
  /*<![CDATA[*/
  var initialDiscounts = /*[[${discountList}]]*/ [];
  /*]]>*/
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/pages.js}"></script>
</body>
</html>

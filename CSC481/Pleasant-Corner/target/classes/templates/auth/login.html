<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pleasant Corner – Sign In</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/signin.css}"/>
</head>
<body>

<div class="page-wrapper">

  <!-- LEFT: Login Form -->
  <div class="left-panel">
    <div class="form-card">
      <h1 class="brand-title">Pleasant Corner</h1>

      <!-- Error / Logout messages -->
      <div th:if="${errorMsg}" class="alert alert-danger py-2 mb-3" th:text="${errorMsg}"></div>
      <div th:if="${logoutMsg}" class="alert alert-success py-2 mb-3" th:text="${logoutMsg}"></div>

      <form th:action="@{/login}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="form-group">
          <label class="form-label">Username</label>
          <input type="text" name="username" class="form-control" placeholder="admin" autocomplete="username" required/>
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" placeholder="••••••••" autocomplete="current-password" required/>
        </div>

        <div class="extras-row">
          <label class="custom-check">
            <input type="checkbox" checked/>
            <span class="check-box">
              <svg width="13" height="10" viewBox="0 0 13 10" fill="none">
                <path d="M1 5L5 9L12 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
            <span class="check-label">Remember Me</span>
          </label>
          <a href="#" class="forgot-link">Forgot Password?</a>
        </div>

        <button type="submit" class="btn-signin">Sign into Dashboard</button>
      </form>
    </div>
  </div>

  <!-- RIGHT: Logo -->
  <div class="right-panel">
    <img class="logo-img" th:src="@{/images/logo.jpg}" alt="Pleasant Corner Logo"/>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/signin.js}"></script>
</body>
</html>

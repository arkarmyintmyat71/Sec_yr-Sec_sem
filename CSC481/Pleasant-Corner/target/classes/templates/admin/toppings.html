<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pleasant Corner – Toppings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/topping_style.css}"/>
</head>
<body>
<div id="appWrapper" class="app-wrapper">
  <div id="sidebarOverlay"></div>
  <div th:replace="~{admin/fragments :: sidebar('toppings')}"></div>
  <div class="main-panel" id="mainPanel">
    <div th:replace="~{admin/fragments :: topbar('Toppings')}"></div>
    <main class="page-content">
      <div class="toppings-toolbar">
        <input type="text" class="search-box" id="searchInput" placeholder="Search toppings..."/>
        <button class="btn-add-topping" id="addToppingBtn">+ Add Topping</button>
      </div>
      <div class="toppings-layout">
        <div>
          <div class="toppings-card">
            <div class="toppings-card-header">
              <span class="toppings-card-title">All Toppings</span>
              <span class="toppings-card-sub" id="appliesLabel">Applies to: Cakes &amp; Pastries &amp; Desserts</span>
            </div>
            <div id="toppingsList"></div>
          </div>
        </div>
        <div>
          <div class="applies-card">
            <div class="applies-card-title">Applies To</div>
            <div class="applies-card-sub">Select which menu categories support toppings.</div>
            <div class="applies-checkbox-list" id="appliesCheckboxes"></div>
            <div class="max-toppings-label">Max Toppings Per Item</div>
            <div class="max-toppings-hint">Customers can select up to <strong id="maxDisplay">3</strong> toppings per dessert item.</div>
            <input type="number" class="max-toppings-input" id="maxToppingsInput" value="3" min="1" max="20"/>
            <button class="btn-save-settings" id="saveSettingsBtn">Save Settings</button>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- ADD / EDIT TOPPING MODAL – using correct tp-* CSS classes -->
<div class="modal fade" id="toppingModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered" style="max-width:480px;">
    <div class="modal-content tp-modal-content" style="position:relative;">

      <div class="tp-header">
        <div class="tp-title" id="modalTitle">Add Topping</div>
        <button class="tp-close" data-bs-dismiss="modal" aria-label="Close"><i class="bi bi-x"></i></button>
      </div>

      <div class="tp-body">

        <label class="tp-label">Topping Name</label>
        <input type="text" class="tp-input" id="tpName" placeholder="e.g. Fresh Strawberry"/>

        <div class="tp-row">
          <div>
            <label class="tp-label">Extra Price (฿)</label>
            <input type="number" class="tp-input" id="tpPrice" value="0" min="0"/>
          </div>
          <div>
            <label class="tp-label">Emoji / Icon</label>
            <button type="button" class="tp-emoji-btn" id="tpEmojiBtn" onclick="tpCycleEmoji()">
              <span class="tp-emoji-current" id="tpEmojiCurrent">🍓</span>
              <span class="tp-emoji-tap">tap to change</span>
            </button>
            <input type="hidden" id="tpEmoji" value="🍓"/>
          </div>
        </div>

        <label class="tp-label">Description</label>
        <input type="text" class="tp-input" id="tpDesc" placeholder="Short description (optional)"/>

        <label class="tp-label">Applies to Categories</label>
        <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:14px;">
          <label style="display:flex;align-items:center;gap:8px;font-size:.85rem;color:#2c2009;cursor:pointer;">
            <input type="checkbox" class="tp-category-check" value="Cakes &amp; Pastries" checked style="accent-color:#b8923a;width:15px;height:15px;"/>
            Cakes &amp; Pastries
          </label>
          <label style="display:flex;align-items:center;gap:8px;font-size:.85rem;color:#2c2009;cursor:pointer;">
            <input type="checkbox" class="tp-category-check" value="Desserts" checked style="accent-color:#b8923a;width:15px;height:15px;"/>
            Desserts
          </label>
          <label style="display:flex;align-items:center;gap:8px;font-size:.85rem;color:#2c2009;cursor:pointer;">
            <input type="checkbox" class="tp-category-check" value="Waffles &amp; Pancakes" checked style="accent-color:#b8923a;width:15px;height:15px;"/>
            Waffles &amp; Pancakes
          </label>
          <label style="display:flex;align-items:center;gap:8px;font-size:.85rem;color:#2c2009;cursor:pointer;">
            <input type="checkbox" class="tp-category-check" value="Ice Cream" checked style="accent-color:#b8923a;width:15px;height:15px;"/>
            Ice Cream
          </label>
        </div>

        <label class="tp-label">Available</label>
        <div class="tp-avail-row">
          <label class="toggle-switch">
            <input type="checkbox" id="tpAvail" checked/>
            <span class="toggle-slider"></span>
          </label>
          <span class="tp-avail-label">Active</span>
        </div>

      </div>

      <div class="tp-footer">
        <button class="tp-btn-cancel" data-bs-dismiss="modal">Cancel</button>
        <button class="tp-btn-save" id="saveToppingBtn">Save Topping</button>
      </div>
    </div>
  </div>
</div>

<script th:inline="javascript">
  /*<![CDATA[*/
  var initialToppings = /*[[${toppingList}]]*/ [];
  /*]]>*/
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // Cycle through common topping emojis on tap
  const TP_EMOJIS = ['🍓','🍦','🍫','🍥','🥜','🍯','🍒','🫐','🥝','🍑','🍌','🍋','🫒','🧀','🍰','🧁'];
  let tpEmojiIdx = 0;
  function tpCycleEmoji() {
    tpEmojiIdx = (tpEmojiIdx + 1) % TP_EMOJIS.length;
    const e = TP_EMOJIS[tpEmojiIdx];
    document.getElementById('tpEmojiCurrent').textContent = e;
    document.getElementById('tpEmoji').value = e;
  }
  function tpSetEmoji(e) {
    document.getElementById('tpEmojiCurrent').textContent = e;
    document.getElementById('tpEmoji').value = e;
    tpEmojiIdx = TP_EMOJIS.indexOf(e);
    if (tpEmojiIdx < 0) tpEmojiIdx = 0;
  }
</script>
<script th:src="@{/js/pages.js}"></script>
</body>
</html>

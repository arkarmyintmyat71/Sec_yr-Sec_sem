<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pleasant Corner – Staff Member</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/staff_style.css}"/>
  <style>
    .as-card { background:#fff; border-radius:16px; border:1px solid #e6dcc5; box-shadow:0 2px 16px rgba(44,32,9,.06); overflow:hidden; max-width:820px; }
    .as-card-header { padding:20px 28px; border-bottom:1px solid #e6dcc5; display:flex; align-items:center; gap:14px; }
    .as-card-icon { width:42px; height:42px; border-radius:11px; background:#f5ede0; display:flex; align-items:center; justify-content:center; color:#b8923a; font-size:1.2rem; flex-shrink:0; }
    .as-card-title { font-family:'Playfair Display',serif; font-size:1.05rem; font-weight:700; color:#2c2009; }
    .as-card-sub { font-size:.78rem; color:#a8975e; margin-top:2px; }
    .as-card-body { padding:28px; }
    .as-preview { display:flex; align-items:center; gap:20px; padding:18px 22px; background:#fdf9f2; border-radius:12px; margin-bottom:26px; border:1.5px dashed #e0d0b0; }
    .as-avatar-preview { width:68px; height:68px; border-radius:50%; border:3px solid #e6dcc5; display:flex; align-items:center; justify-content:center; font-size:1.4rem; font-weight:700; flex-shrink:0; font-family:'Playfair Display',serif; }
    .as-preview-name { font-size:.95rem; font-weight:600; color:#2c2009; }
    .as-preview-role { font-size:.78rem; color:#a8975e; margin-top:2px; }
    .as-section { font-size:.65rem; font-weight:700; text-transform:uppercase; letter-spacing:.1em; color:#b8923a; margin-bottom:14px; padding-bottom:7px; border-bottom:1.5px solid #f0e6d0; display:flex; align-items:center; gap:7px; }
    .as-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px 18px; margin-bottom:24px; }
    .as-field { display:flex; flex-direction:column; gap:5px; }
    .as-field.full { grid-column:span 2; }
    .as-label { font-size:.7rem; font-weight:600; color:#7a6535; text-transform:uppercase; letter-spacing:.05em; }
    .as-req { color:#c0392b; }
    .as-input { padding:8px 12px; border:1.5px solid #e6dcc5; border-radius:8px; font-family:'DM Sans',sans-serif; font-size:.88rem; color:#2c2009; background:#fff; outline:none; width:100%; }
    .as-input:focus { border-color:#b8923a; box-shadow:0 0 0 3px rgba(184,146,58,.1); }
    .as-textarea { min-height:80px; resize:vertical; }
    .as-footer { display:flex; align-items:center; justify-content:space-between; padding-top:22px; border-top:1px solid #e6dcc5; margin-top:4px; }
    .as-footer-hint { font-size:.72rem; color:#a8975e; }
    .as-btn-submit { padding:9px 22px; background:#2c2009; color:#e8c96a; border:none; border-radius:8px; font-family:'DM Sans',sans-serif; font-size:.88rem; font-weight:600; cursor:pointer; }
    .as-btn-submit:hover { background:#1a1205; }
    .as-btn-cancel { padding:9px 18px; background:transparent; color:#7a6535; border:1.5px solid #e6dcc5; border-radius:8px; font-family:'DM Sans',sans-serif; font-size:.88rem; font-weight:600; cursor:pointer; text-decoration:none; display:inline-block; }
    .as-btn-cancel:hover { background:#fdf9f2; color:#2c2009; }
    .breadcrumb-row { display:flex; align-items:center; gap:7px; margin-bottom:20px; font-size:.82rem; color:#a8975e; }
    .breadcrumb-row a { color:#b8923a; font-weight:600; text-decoration:none; }
    .breadcrumb-row a:hover { text-decoration:underline; }
  </style>
</head>
<body>
<div id="appWrapper" class="app-wrapper">
  <div id="sidebarOverlay" class="sidebar-overlay"></div>
  <div th:replace="~{admin/fragments :: sidebar('staff')}"></div>
  <div class="main-panel" id="mainPanel">
    <div th:replace="~{admin/fragments :: topbar('Staff Member')}"></div>

    <main class="page-content">
      <!-- Breadcrumb -->
      <div class="breadcrumb-row">
        <a th:href="@{/admin/staff}">Staff Members</a>
        <span>›</span>
        <span>Staff Member</span>
      </div>
      <form class="as-card"
            th:action="${isEdit} ? @{/admin/staff/update} : @{/admin/staff/add}"
            th:object="${staff}"
            method="post">

        <!-- ✅ IMPORTANT for EDIT -->
        <input type="hidden" th:if="${isEdit}" th:field="*{id}"/>

        <!-- Header -->
        <div class="as-card-header">
          <div class="as-card-icon">
            <i class="bi" th:classappend="${isEdit} ? 'bi-pencil-square' : 'bi-person-plus'"></i>
          </div>
          <div>
            <div class="as-card-title"
                 th:text="${isEdit} ? 'Edit Staff Member' : 'Add New Staff Member'"></div>

            <div class="as-card-sub"
                 th:text="${isEdit} ? 'Update staff information below.' :
                                'Fill in details to add new staff.'"></div>
          </div>
        </div>

        <div class="as-card-body">

          <!-- 🔥 LIVE PREVIEW -->
          <div class="as-preview">
            <div class="as-avatar-preview" id="asAvatarPreview">?</div>
            <div>
              <div class="as-preview-name" id="asNamePreview">Full Name</div>
              <div class="as-preview-role" id="asRolePreview">Role</div>
            </div>
          </div>

          <!-- PERSONAL -->
          <div class="as-section"><i class="bi bi-person"></i> Personal</div>

          <div class="as-grid">
            <div class="as-field">
              <label class="as-label">Full Name *</label>
              <input type="text" class="as-input"
                     th:field="*{fullName}" id="asFullName" placeholder="Alice"/>
            </div>

            <div class="as-field">
              <label class="as-label">Email *</label>
              <input type="email" class="as-input"
                     th:field="*{email}" id="asEmail" placeholder="alice@gmail.com"/>
            </div>

            <div class="as-field">
              <label class="as-label">Phone</label>
              <input type="text" class="as-input"
                     th:field="*{phone}" id="asPhone" placeholder="+66xxxxxxxxx"/>
            </div>
          </div>

          <!-- JOB -->
          <div class="as-section"><i class="bi bi-briefcase"></i> Job</div>

          <div class="as-grid">
            <div class="as-field">
              <label class="as-label">Role *</label>
              <select class="as-input" th:field="*{role}" id="asRole">
                <option value="">Select role</option>
                <option value="Barista">Barista</option>
                <option value="Cashier">Cashier</option>
                <option value="Staff">Staff</option>
              </select>
            </div>

            <div class="as-field">
              <label class="as-label">Availability</label>
              <select class="as-input" th:field="*{availability}">
                <option value="Full-time">Full-time</option>
                <option value="Part-time">Part-time</option>
              </select>
            </div>

            <div class="as-field">
              <label class="as-label">Salary</label>
              <input type="number" class="as-input"
                     th:field="*{monthlySalary}"/>
            </div>

            <div class="as-field">
              <label class="as-label">Start Date</label>
              <input type="date"
                     class="as-input"
                     th:field="*{registeredDate}"
                     th:attr="value=${staff.registeredDate != null ? #temporals.format(staff.registeredDate, 'yyyy-MM-dd') : ''}" />
            </div>

            <div class="as-field full">
              <label class="as-label">Experience</label>
              <input type="text" class="as-input" placeholder="1 yr exp"
                     th:field="*{experience}"/>
            </div>

            <div class="as-field full">
              <label class="as-label">Notes</label>
              <textarea class="as-input"
                        th:field="*{notes}" placeholder="anything else..."></textarea>
            </div>
          </div>

          <!-- FOOTER -->
          <div class="as-footer">
            <a th:href="@{/admin/staff}" class="as-btn-cancel">Cancel</a>

            <button type="submit" class="as-btn-submit"
                    th:text="${isEdit} ? 'Update Staff' : 'Add Staff'"></button>
          </div>

        </div>
      </form>
    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/pages.js}"></script>
</body>
</html>

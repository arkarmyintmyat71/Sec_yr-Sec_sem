<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pleasant Corner – Error</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f0e8;
      font-family: 'DM Sans', sans-serif;
      color: #2c2c2c;
    }
    .error-card {
      background: #fff;
      border-radius: 18px;
      padding: 56px 48px;
      text-align: center;
      box-shadow: 0 4px 32px rgba(0,0,0,.08);
      max-width: 440px;
      width: 90%;
    }
    .error-code {
      font-family: 'Playfair Display', serif;
      font-size: 5rem;
      color: #b8923a;
      line-height: 1;
      margin-bottom: 12px;
    }
    .error-icon {
      font-size: 2.5rem;
      color: #b8923a;
      margin-bottom: 16px;
    }
    .error-title {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 10px;
    }
    .error-msg {
      font-size: .93rem;
      color: #6b6b6b;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .btn-home {
      display: inline-block;
      background: #b8923a;
      color: #fff;
      text-decoration: none;
      padding: 12px 32px;
      border-radius: 8px;
      font-size: .95rem;
      font-weight: 500;
      transition: background .2s;
    }
    .btn-home:hover { background: #9a7830; color: #fff; }
    .brand { font-family: 'Playfair Display', serif; font-size: .9rem; color: #b8923a; margin-top: 32px; opacity: .7; }
  </style>
</head>
<body>
  <div class="error-card">
    <div class="error-code" th:text="${status}">404</div>
    <div class="error-title">Oops!</div>
    <p class="error-msg" th:text="${message}">The page you're looking for doesn't exist.</p>
    <a th:href="@{/admin/dashboard}" class="btn-home">
      <i class="bi bi-house-door me-1"></i> Back to Dashboard
    </a>
    <p class="brand">Pleasant Corner</p>
  </div>
</body>
</html>
